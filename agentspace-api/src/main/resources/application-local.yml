spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/agentspace
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash
  image-model: gemini-2.5-flash-image

ai:
  model: claude-sonnet-4-20250514
  max-tokens: 2048
  temperature: 0.7

logging:
  level:
    com.agentspace: DEBUG